<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frutas - Mercado</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: #e67e22; color: white; padding: 15px; text-align: center; }
    .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
    .product { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 15px; text-align: center; }
    .product h3 { margin: 10px 0; }
    .product p { font-size: 18px; color: #27ae60; margin: 7px 0; }
    .product button { background: #27ae60; color: white; border: none; padding: 10px 12px; border-radius: 6px; cursor: pointer; }
    .product button:hover { background: #219150; }
    .back-btn { background: #3498db; color: white; padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    .back-btn:hover { background: #2980b9; }
  </style>
</head>
<body>
<header><h1>Frutas</h1></header>
<div class="container">
  <button class="back-btn" onclick="window.location.href='mercado.html'">← Voltar</button>
  <div class="products">
    <div class="product"><h3>🍎 Maçã</h3><p>R$ 5,50</p><button onclick="addToCart('Maçã', 5.5)">Adicionar</button></div>
    <div class="product"><h3>🍌 Banana</h3><p>R$ 3,50</p><button onclick="addToCart('Banana', 3.5)">Adicionar</button></div>
    <div class="product"><h3>🍊 Laranja</h3><p>R$ 4,00</p><button onclick="addToCart('Laranja', 4.0)">Adicionar</button></div>
    <div class="product"><h3>🍓 Morango</h3><p>R$ 8,50</p><button onclick="addToCart('Morango', 8.5)">Adicionar</button></div>
    <div class="product"><h3>🍉 Melancia</h3><p>R$ 15,00</p><button onclick="addToCart('Melancia', 15.0)">Adicionar</button></div>
  </div>
</div>
<script>
  function addToCart(nome, preco) {
    let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
    cartItems.push({id: Date.now(), nome, preco});
    localStorage.setItem('cartItems', JSON.stringify(cartItems));
    window.location.href = 'mercado.html';
  }
</script>
</body>
</html>
