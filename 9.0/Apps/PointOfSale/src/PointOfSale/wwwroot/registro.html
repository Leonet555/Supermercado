<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Mercado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('fundo-registro.jpg') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .box {
      width: 420px;
      background: white;
      border-radius: 14px;
      padding: 36px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    h1 { margin: 0 0 24px; font-size: 28px; color: #333; }
    input { width: 100%; max-width: 340px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid #bbb; border-radius: 8px; font-size: 16px; }
    button { width: 100%; max-width: 340px; padding: 12px; margin-top: 12px; background: #2ecc71; border: none; border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }    button:hover { opacity: 0.95; }
    .small { margin-top: 18px; font-size: 14px; }
    .small a { color: #3498db; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Registro</h1>
    <input id="name" type="text" placeholder="Nome completo" />
    <input id="email" type="email" placeholder="E-mail" />
    <input id="password" type="password" placeholder="Senha" />
    <button onclick="doRegister()">Registrar</button>
    <p class="small">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>

  <script src="js/db.js"></script>
  <script>
    function doRegister() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!name || !email || !password) {
        alert('Preencha nome, e-mail e senha.');
        return;
      }
      getUserByEmail(email).then((existing) => {
        if (existing) {
          alert('Este e-mail já está cadastrado. Faça login.');
          return;
        }
        addUser({ name, email, password }).then(() => {
          alert('Registro concluído! Bem-vindo ao mercado.');
          window.location.href = 'mercado.html';
        }).catch((err) => {
          console.error(err);
          alert('Erro ao cadastrar. Tente novamente.');
        });
      }).catch((err) => {
        console.error(err);
        alert('Falha ao acessar o banco de dados.');
      });
    }
  </script>
</body>
</html>
